<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clip Trimmer</title>
  <link rel="stylesheet" href="/style.css?v=4" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Clip Trimmer</h1>
      <div id="auth-status">
        <span id="auth-label">Checking…</span>
        <button id="auth-btn" class="hidden"></button>
      </div>
    </header>

    <main>
      <!-- Load panel -->
      <section id="load-panel">
        <div class="card">
          <!-- Folder browser -->
          <div id="folder-section">
            <label for="folder-url">Your videos folder</label>
            <div class="input-row">
              <input
                type="text"
                id="folder-url"
                placeholder="https://drive.google.com/drive/folders/…"
                autocomplete="off"
                spellcheck="false"
              />
              <button id="browse-btn"><i class="ph-duotone ph-folder-open"></i> Browse</button>
            </div>
            <div id="folder-error" class="error hidden"></div>

            <div id="file-list-wrap" class="hidden">
              <div id="file-list-header">
                <span id="file-count"></span>
                <div id="file-list-header-btns">
                  <label id="select-all-label" title="Select / deselect all">
                    <input type="checkbox" id="select-all-cb" />
                    All
                  </label>
                  <button id="load-selected-btn" class="small hidden"><i class="ph-duotone ph-check-circle"></i> Load Selected (0)</button>
                  <button id="refresh-btn" class="secondary small" title="Refresh file list"><i class="ph-duotone ph-arrow-clockwise"></i></button>
                </div>
              </div>
              <ul id="file-list"></ul>
            </div>
          </div>

          <div class="divider"><span>or paste a direct file link</span></div>

          <label for="drive-url">Direct file link</label>
          <div class="input-row">
            <input
              type="text"
              id="drive-url"
              placeholder="https://drive.google.com/file/d/…/view"
              autocomplete="off"
              spellcheck="false"
            />
            <button id="load-btn"><i class="ph-duotone ph-cloud-arrow-down"></i> Load</button>
          </div>
          <div id="load-error" class="error hidden"></div>

          <div class="divider"><span>output destination</span></div>

          <label for="output-folder-url">Clips output folder</label>
          <div class="input-row">
            <input
              type="text"
              id="output-folder-url"
              placeholder="https://drive.google.com/drive/folders/… (leave blank to use source folder)"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
        </div>
      </section>

      <!-- Spinner -->
      <section id="spinner-panel" class="hidden">
        <div class="card center">
          <div class="spinner"></div>
          <p id="spinner-label">Loading to timeline…</p>
          <div id="buffer-bar-wrap" class="hidden">
            <div id="buffer-bar"><div id="buffer-fill"></div></div>
            <p id="buffer-label"></p>
          </div>
        </div>
      </section>

      <!-- Success toast -->
      <div id="success-toast" class="hidden"></div>

      <!-- Editor panel -->
      <section id="editor-panel" class="hidden">
        <div class="card editor-card">
          <p class="filename" id="video-filename"></p>

          <!-- ═══════════════════════ VIEW 1 — EDITOR ═══════════════════════ -->
          <div id="editor-view">

            <!-- 3-column layout: left sidebar | video+timeline | right sidebar -->
            <div class="editor-columns">

              <!-- LEFT SIDEBAR: trim controls only -->
              <div class="editor-left">
                <div class="panel-card trim-panel">
                  <div class="panel-title">Trim Points</div>
                  <div class="inout-row">
                    <div class="io-pair">
                      <label>In</label>
                      <div class="tp-row">
                        <input type="text" id="in-time" placeholder="0:00.000" />
                        <button id="set-in-btn" title="Set In to current time"><i class="ph-duotone ph-bracket-square-left"></i></button>
                      </div>
                    </div>
                    <span class="io-sep">→</span>
                    <div class="io-pair">
                      <label>Out</label>
                      <div class="tp-row">
                        <input type="text" id="out-time" placeholder="0:00.000" />
                        <button id="set-out-btn" title="Set Out to current time"><i class="ph-duotone ph-bracket-square-right"></i></button>
                      </div>
                    </div>
                  </div>
                  <div class="trim-range" id="trim-range-display"></div>
                  <div class="speed-row">
                    <span class="speed-label">Speed</span>
                    <div class="speed-btns">
                      <button class="speed-btn secondary small" data-speed="0.25">0.25×</button>
                      <button class="speed-btn secondary small" data-speed="0.5">0.5×</button>
                      <button class="speed-btn secondary small" data-speed="0.75">0.75×</button>
                      <button class="speed-btn secondary small active" data-speed="1">1×</button>
                      <button class="speed-btn secondary small" data-speed="1.5">1.5×</button>
                      <button class="speed-btn secondary small" data-speed="2">2×</button>
                    </div>
                  </div>
                </div>
              </div><!-- /.editor-left -->

              <!-- CENTER: video + controls + timeline -->
              <div class="editor-center">
                <div class="player-col">
                  <div class="player-wrap">
                    <video id="player" preload="metadata">
                      Your browser does not support HTML5 video.
                    </video>
                    <canvas id="scrub-canvas"></canvas>
                  </div>
                  <div class="player-controls">
                    <button id="frame-back-btn" class="ctrl-btn ctrl-secondary" title="Step back 20 frames"><i class="ph-duotone ph-skip-back"></i></button>
                    <button id="play-pause-btn" class="ctrl-btn" title="Play / Pause"><i class="ph-duotone ph-play"></i></button>
                    <button id="frame-fwd-btn" class="ctrl-btn ctrl-secondary" title="Step forward 20 frames"><i class="ph-duotone ph-skip-forward"></i></button>
                    <button id="mute-btn" class="ctrl-btn" title="Mute / Unmute"><i class="ph-duotone ph-speaker-high"></i></button>
                    <button id="gear-btn" class="ctrl-btn ctrl-secondary" title="Configure hotkeys"><i class="ph-duotone ph-gear"></i></button>
                    <button id="fullscreen-btn" class="ctrl-btn" title="Fullscreen"><i class="ph-duotone ph-arrows-out"></i></button>
                    <span id="seek-status" class="seek-status hidden"></span>
                  </div>
                  <div id="hotkeys-panel" class="hidden">
                    <div class="hotkeys-opts">
                      <label><input type="checkbox" id="auto-queue-toggle"> Auto-add to queue on Out point</label>
                    </div>
                    <div class="hotkeys-grid"></div>
                  </div>
                </div>

                <!-- Timeline -->
                <div class="timeline-wrap">
                  <div class="tl-header">
                    <button id="tl-zoom-out" class="tl-zoom-btn" title="Zoom out"><i class="ph-duotone ph-magnifying-glass-minus"></i></button>
                    <button id="tl-zoom-in"  class="tl-zoom-btn" title="Zoom in"><i class="ph-duotone ph-magnifying-glass-plus"></i></button>
                  </div>
                  <canvas id="timeline" height="50"></canvas>
                  <canvas id="waveform" height="24"></canvas>
                  <div class="tl-scrollbar-row">
                    <div id="tl-scrollbar" class="tl-scrollbar hidden">
                      <div id="tl-scrollbar-thumb" class="tl-scrollbar-thumb"></div>
                    </div>
                    <span id="tl-zoom-label" class="tl-zoom-label"></span>
                  </div>
                </div>
              </div><!-- /.editor-center -->

              <!-- RIGHT SIDEBAR: actions + export -->
              <div class="editor-right">
                <!-- Validation errors -->
                <div id="trim-error" class="error hidden"></div>

                <!-- Action buttons -->
                <div class="editor-actions">
                  <button id="split-btn" class="secondary full-width" title="Split queued clip at playhead (S)"><i class="ph-duotone ph-scissors"></i> Split</button>
                  <button id="add-queue-btn" class="secondary full-width"><i class="ph-duotone ph-plus-circle"></i> Add to Queue</button>
                </div>

                <!-- Export panel -->
                <div id="export-drop-panel" class="panel-card">
                  <div class="panel-title">Export</div>
                  <div class="rename-row">
                    <label for="out-filename">Save as</label>
                    <input type="text" id="out-filename" placeholder="filename.mp4" />
                  </div>
                  <div class="group-tag-row">
                    <label for="group-tag">Group tag <span class="muted-hint">(e.g. "highlights"…)</span></label>
                    <input type="text" id="group-tag" placeholder="optional" autocomplete="off" spellcheck="false" />
                  </div>
                  <div class="out-folder-row">
                    <label for="output-folder-editor">Output folder <span class="muted-hint">(Drive URL or ID)</span></label>
                    <input type="text" id="output-folder-editor" placeholder="drive.google.com/drive/folders/…" autocomplete="off" spellcheck="false" />
                  </div>
                  <button id="trim-btn" class="full-width"><i class="ph-duotone ph-upload-simple"></i> Trim &amp; Upload</button>
                </div>
              </div><!-- /.editor-right -->

            </div><!-- /.editor-columns -->

            <!-- hidden export drop btn kept for JS compat -->
            <button id="export-drop-btn" class="hidden" aria-hidden="true"></button>

          </div><!-- /#editor-view -->

          <!-- ═══════════════════════ VIEW 2 — QUEUE ════════════════════════ -->
          <div id="queue-view" class="hidden">

            <div class="queue-view-header">
              <button id="back-to-editor-btn" class="secondary"><i class="ph-duotone ph-arrow-left"></i> Back to Editor</button>
              <span class="queue-view-title">Clip Queue</span>
            </div>

            <div id="queue-section" class="hidden">
              <div class="queue-header">
                <span id="queue-count">0 clips queued</span>
                <div class="queue-header-btns">
                  <button id="clear-queue-btn" class="secondary small" title="Clear all clips"><i class="ph-duotone ph-trash"></i> Clear all</button>
                  <button id="join-queue-btn" class="secondary small" title="Concatenate all clips into one file"><i class="ph-duotone ph-link"></i> Join all</button>
                  <button id="upload-queue-btn" class="small"><i class="ph-duotone ph-upload-simple"></i> Upload Queue</button>
                </div>
              </div>
              <ul id="queue-list"></ul>
              <div id="queue-progress" class="hidden">
                <div id="queue-bar"><div id="queue-fill"></div></div>
                <p id="queue-label"></p>
              </div>
            </div>

          </div><!-- /#queue-view -->

          <div class="bottom-row">
            <button id="reset-btn" class="secondary"><i class="ph-duotone ph-arrow-counter-clockwise"></i> Reset &amp; Clear All</button>
            <button id="add-clip-btn" class="secondary"><i class="ph-duotone ph-folder-open"></i> Load Another Clip</button>
            <button id="reload-btn" class="secondary" title="Reload clip"><i class="ph-duotone ph-arrow-clockwise"></i></button>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- Error / event log panel -->
  <div id="log-panel">
    <div id="log-header">
      <span id="log-title">&#9656; Event Log</span>
      <span id="log-badge" class="hidden">0</span>
      <div id="log-header-btns">
        <button id="log-copy-btn" class="small secondary" title="Copy log"><i class="ph-duotone ph-copy"></i></button>
        <button id="log-clear-btn" class="small secondary" title="Clear log"><i class="ph-duotone ph-eraser"></i></button>
        <button id="log-toggle-btn" class="small secondary" title="Show / Hide"><i class="ph-duotone ph-caret-down"></i></button>
      </div>
    </div>
    <ul id="log-list"></ul>
  </div>

  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <script src="/webcodecs-reverse.js"></script>
  <script src="/app.js"></script>
</body>
</html>
